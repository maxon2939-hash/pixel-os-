name: Build PixelOS Android 16 Nothing 3A

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk python3 git-core bc ccache zip unzip repo

      # 3️⃣ Initialize PixelOS manifest (Android 16 QPR2)
      - name: Initialize PixelOS repo
        run: |
          mkdir -p ~/pixelos && cd ~/pixelos
          repo init -u https://github.com/PixelOS-AOSP/manifest.git -b PixelOS_Android-16_QPR2
          repo sync -c -j4 --no-clone-bundle --no-tags

      # 4️⃣ Clone device tree & vendor blobs pentru Nothing 3A
      - name: Clone device & vendor
        run: |
          git clone https://github.com
